name: Build ArcMail

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-amd64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-amd64
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
          - platform: macos-13
            target: x86_64-apple-darwin
            name: macos-amd64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      - name: Smoke test (Linux)
        if: contains(matrix.platform, 'ubuntu')
        run: |
          # Start app with timeout — verify it launches without crashing
          timeout 5 xvfb-run frontend/src-tauri/target/${{ matrix.target }}/release/app 2>&1 || EXIT_CODE=$?
          # Exit code 124 = timeout (expected — app runs until killed)
          # Exit code 0 = app exited cleanly
          # Any other code = crash
          if [ "${EXIT_CODE:-0}" != "124" ] && [ "${EXIT_CODE:-0}" != "0" ]; then
            echo "SMOKE TEST FAILED: app crashed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Smoke test passed (app launched successfully)"

      - name: Smoke test (macOS)
        if: contains(matrix.platform, 'macos')
        continue-on-error: true
        run: |
          # macOS CI runners have a display, so we can test app launch
          APP_PATH=$(find frontend/src-tauri/target -name "ArcMail.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            # Launch in background, wait, check if still running
            "$APP_PATH/Contents/MacOS/app" &
            APP_PID=$!
            sleep 3
            if kill -0 $APP_PID 2>/dev/null; then
              echo "Smoke test passed — app is running (PID=$APP_PID)"
              kill $APP_PID 2>/dev/null || true
            else
              wait $APP_PID 2>/dev/null || EXIT_CODE=$?
              if [ "${EXIT_CODE:-0}" != "0" ]; then
                echo "WARNING: app exited with code $EXIT_CODE (may be expected in headless CI)"
              fi
            fi
          fi

      - name: Smoke test (Windows)
        if: contains(matrix.platform, 'windows')
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "frontend\src-tauri\target" -Filter "ArcMail.exe" -Recurse | Select-Object -First 1
          if ($exe) {
            $proc = Start-Process -FilePath $exe.FullName -PassThru
            Start-Sleep -Seconds 5
            if ($proc.HasExited -and $proc.ExitCode -ne 0) {
              Write-Error "SMOKE TEST FAILED: app crashed with exit code $($proc.ExitCode)"
              exit 1
            }
            if (!$proc.HasExited) { $proc.Kill() }
            Write-Output "Smoke test passed"
          }

      - name: Upload Linux artifacts
        if: contains(matrix.platform, 'ubuntu')
        uses: actions/upload-artifact@v4
        with:
          name: ArcMail-${{ matrix.name }}
          path: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

      - name: Upload Windows artifacts
        if: contains(matrix.platform, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: ArcMail-${{ matrix.name }}
          path: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

      - name: Upload macOS artifacts
        if: contains(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: ArcMail-${{ matrix.name }}
          path: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
